version: "3.8"

services:
  integration-tests:
    image: python:3.8
    command:
      - /bin/bash
      - -v
      - -c
      - |
        . poetry_install_vars.sh
        curl -sSL -o /tmp/get-poetry.py "$$POETRY_URL"
        python /tmp/get-poetry.py --yes --no-modify-path --version="$$POETRY_VERSION"
        . "$$HOME/.poetry/env"
        poetry install --no-interaction
        poetry run pytest -o cache_dir=/pytest-cache --no-cov --only-integration
    depends_on:
      - opc-server
    environment:
      - POETRY_CACHE_DIR=/poetry-cache
      - POETRY_VIRTUALENVS_IN_PROJECT=false
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    init: true
    volumes:
      - ../..:/usr/src/app:ro
      - ./.cache/poetry:/poetry-cache
      - ./.cache/pytest:/pytest-cache
    working_dir: /usr/src/app

  opc-server:
    build: ./opc_server
